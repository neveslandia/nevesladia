<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nevesladia</title>

<style>
body{
background:#06101d;
color:white;
font-family:Arial;
margin:0;
}

.container{padding:20px}

.top{
display:flex;
gap:10px;
margin-bottom:20px;
}

button{
background:#0b1c31;
color:#76d0ff;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.active{
background:#33b7ff;
color:black;
}

.card{
background:#0b1c31;
border:1px solid rgba(255,255,255,0.1);
border-radius:12px;
padding:10px;
margin-bottom:10px;
display:flex;
align-items:center;
gap:10px;
}

img{
width:50px;
height:50px;
object-fit:contain;
}

.progress{
height:8px;
background:#222;
border-radius:10px;
margin-top:5px;
}

.bar{
height:8px;
background:#33b7ff;
border-radius:10px;
}

.title{
color:#f2c96b;
font-size:22px;
margin-bottom:10px;
}

select,input{
padding:8px;
border-radius:6px;
border:none;
margin:5px;
}
</style>

</head>

<body>

<div class="container">

<div class="top">
<button onclick="show('heroes')" class="active" id="btnH">Heroes</button>
<button onclick="show('tasks')" id="btnT">Tasks</button>
</div>

<div id="heroes">

<div class="title">Heroes</div>

<input id="name" placeholder="Nome">
<input id="level" placeholder="Level">

<button onclick="addHero()">Salvar</button>

<div id="heroList"></div>

</div>

<div id="tasks" style="display:none">

<div class="title">Linked Tasks</div>

<select id="heroSelect" onchange="changeHero()"></select>

<div id="tasksList"></div>

</div>

</div>

<script>

let heroes = JSON.parse(localStorage.getItem("heroes")||"[]");
let progress = JSON.parse(localStorage.getItem("progress")||"{}");
let currentHero = localStorage.getItem("hero")||"";

function save(){
localStorage.setItem("heroes",JSON.stringify(heroes));
localStorage.setItem("progress",JSON.stringify(progress));
localStorage.setItem("hero",currentHero);
}

function show(tab){
document.getElementById("heroes").style.display = tab=="heroes"?"block":"none";
document.getElementById("tasks").style.display = tab=="tasks"?"block":"none";

btnH.classList.remove("active");
btnT.classList.remove("active");

if(tab=="heroes") btnH.classList.add("active");
if(tab=="tasks") btnT.classList.add("active");
}

function addHero(){
let name=document.getElementById("name").value;
let level=document.getElementById("level").value;

heroes.push({name,level});
save();
renderHeroes();
}

function renderHeroes(){
let div=document.getElementById("heroList");
div.innerHTML="";

heroes.forEach(h=>{
div.innerHTML+=`
<div class="card">
${h.name} (lvl ${h.level})
<button onclick="setHero('${h.name}')">Usar</button>
</div>`;
});

renderSelect();
}

function setHero(name){
currentHero=name;
save();
renderTasks();
}

function renderSelect(){
let sel=document.getElementById("heroSelect");
sel.innerHTML="";

heroes.forEach(h=>{
sel.innerHTML+=`<option value="${h.name}">${h.name}</option>`;
});

sel.value=currentHero;
}

function changeHero(){
currentHero=document.getElementById("heroSelect").value;
save();
renderTasks();
}

const tasks = [
{key:"goblin",name:"Goblin",qty:100,img:"https://static.wikia.nocookie.net/tibia/images/4/4f/Goblin.gif"},
{key:"troll",name:"Troll",qty:100,img:"https://static.wikia.nocookie.net/tibia/images/a/a3/Troll.gif"},
{key:"rotworm",name:"Rotworm",qty:200,img:"https://static.wikia.nocookie.net/tibia/images/3/30/Rotworm.gif"},
{key:"minotaur",name:"Minotaur",qty:200,img:"https://static.wikia.nocookie.net/tibia/images/a/a5/Minotaur.gif"},
{key:"dwarf",name:"Dwarf",qty:300,img:"https://static.wikia.nocookie.net/tibia/images/9/9a/Dwarf.gif"},
{key:"dworcs",name:"Dworcs",qty:300,img:"https://static.wikia.nocookie.net/tibia/images/8/8f/Dworc_Fleshhunter.gif"},
{key:"elf",name:"Elf",qty:400,img:"https://static.wikia.nocookie.net/tibia/images/3/38/Elf.gif"},
{key:"dark",name:"Dark Cathedral",qty:400,img:"https://static.wikia.nocookie.net/tibia/images/5/5e/Dark_Apprentice.gif"},
{key:"tombs",name:"Tombs",qty:800,img:"https://static.wikia.nocookie.net/tibia/images/c/c7/Ghoul.gif"},
{key:"scarab",name:"Scarab",qty:600,img:"https://static.wikia.nocookie.net/tibia/images/7/7c/Scarab.gif"},
{key:"cyclops",name:"Cyclops",qty:500,img:"https://static.wikia.nocookie.net/tibia/images/a/ac/Cyclops.gif"},
{key:"mutated",name:"Mutated Humans",qty:600,img:"https://static.wikia.nocookie.net/tibia/images/6/6a/Mutated_Human.gif"},
{key:"corym",name:"Coryms",qty:400,img:"https://static.wikia.nocookie.net/tibia/images/2/2a/Corym_Skirmisher.gif"},
{key:"banuta",name:"Banuta",qty:500,img:"https://static.wikia.nocookie.net/tibia/images/2/21/Kongra.gif"},
{key:"pirates",name:"Pirates",qty:700,img:"https://static.wikia.nocookie.net/tibia/images/3/3b/Pirate_Marauder.gif"},
{key:"barbarian",name:"Barbarians",qty:700,img:"https://static.wikia.nocookie.net/tibia/images/6/6b/Barbarian_Headsplitter.gif"},
{key:"djinn",name:"Djinn",qty:700,img:"https://static.wikia.nocookie.net/tibia/images/7/70/Marid.gif"},
{key:"stonerefiner",name:"Stonerefiner",qty:500,img:"https://static.wikia.nocookie.net/tibia/images/5/50/Stone_Golem.gif"},
{key:"dragon",name:"Dragon",qty:800,img:"https://static.wikia.nocookie.net/tibia/images/e/ef/Dragon.gif"},
{key:"oramond",name:"Oramond",qty:1000,img:"https://static.wikia.nocookie.net/tibia/images/6/62/Minotaur_Amazon.gif"}
];

function renderTasks(){

let div=document.getElementById("tasksList");
div.innerHTML="";

tasks.forEach(t=>{

let val = progress[currentHero]?.[t.key] || 0;
let pct = Math.floor(val/t.qty*100);

div.innerHTML+=`
<div class="card">

<img src="${t.img}" onerror="this.style.display='none'">

<div style="flex:1">

<b>${t.name}</b>

<div>${val}/${t.qty} (${pct}%)</div>

<div class="progress">
<div class="bar" style="width:${pct}%"></div>
</div>

<button onclick="edit('${t.key}',${t.qty})">✏️</button>

</div>

</div>
`;
});

}

function edit(key,max){

if(!currentHero){
alert("Selecione um hero");
return;
}

let v = prompt("Progresso:");

v = Number(v);

if(!progress[currentHero]) progress[currentHero]={};

progress[currentHero][key]=Math.min(v,max);

save();
renderTasks();
}

renderHeroes();
renderTasks();

</script>

</body>
</html>
