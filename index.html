<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Nevesladia</title>

<style>
body{background:#06101d;color:white;font-family:Arial;margin:0}
.container{padding:20px}
button{cursor:pointer}

.tab{padding:10px;margin:5px;background:#0b1c31;border:none;color:#76d0ff}
.active{background:#1e3c5a}

.card{background:#0b1c31;padding:10px;margin:10px 0;border-radius:10px}

.progress{height:10px;background:#333;border-radius:10px}
.bar{height:10px;background:#33b7ff;border-radius:10px}

img{width:40px;height:40px}
</style>
</head>

<body>

<div class="container">

<h1>Nevesladia</h1>

<button class="tab active" onclick="show('heroes')">Heroes</button>
<button class="tab" onclick="show('tasks')">Linked Tasks</button>

<div id="heroes">
<h2>Heroes</h2>

<input id="name" placeholder="Nome">
<input id="level" placeholder="Level">

<button onclick="addHero()">Salvar</button>

<div id="heroList"></div>
</div>

<div id="tasks" style="display:none">

<h2>Linked Tasks</h2>

<select id="heroSelect" onchange="changeHero()"></select>

<div id="tasksList"></div>

</div>

</div>

<script>

let heroes = JSON.parse(localStorage.getItem("heroes")||"[]");
let progress = JSON.parse(localStorage.getItem("progress")||"{}");
let currentHero = localStorage.getItem("currentHero")||"";

function save(){
localStorage.setItem("heroes",JSON.stringify(heroes));
localStorage.setItem("progress",JSON.stringify(progress));
localStorage.setItem("currentHero",currentHero);
}

function show(tab){
document.getElementById("heroes").style.display = tab=="heroes"?"block":"none";
document.getElementById("tasks").style.display = tab=="tasks"?"block":"none";
}

function addHero(){
let name=document.getElementById("name").value;
let level=document.getElementById("level").value;

heroes.push({name,level});
save();
renderHeroes();
}

function renderHeroes(){
let div=document.getElementById("heroList");
div.innerHTML="";

heroes.forEach(h=>{
div.innerHTML+=`<div class="card">
${h.name} (lvl ${h.level})
<button onclick="setHero('${h.name}')">Usar</button>
</div>`;
});

renderSelect();
}

function setHero(name){
currentHero=name;
save();
renderTasks();
}

function renderSelect(){
let sel=document.getElementById("heroSelect");
sel.innerHTML="";
heroes.forEach(h=>{
sel.innerHTML+=`<option value="${h.name}">${h.name}</option>`;
});
sel.value=currentHero;
}

function changeHero(){
currentHero=document.getElementById("heroSelect").value;
save();
renderTasks();
}

const tasks = [
{key:"goblin",name:"Goblin",qty:100,img:"IMAGENS/goblin.gif"},
{key:"troll",name:"Troll",qty:100,img:"IMAGENS/troll.gif"},
{key:"rotworm",name:"Rotworm",qty:200,img:"IMAGENS/rotworm.gif"},
{key:"minotaur",name:"Minotaur",qty:200,img:"IMAGENS/minotaur.gif"},
{key:"dwarf",name:"Dwarf",qty:300,img:"IMAGENS/dwarf.gif"},
{key:"dworcs",name:"Dworcs",qty:300,img:"IMAGENS/dworc.gif"},
{key:"elf",name:"Elf",qty:400,img:"IMAGENS/elf.gif"},
{key:"dark",name:"Dark Cathedral",qty:400,img:"IMAGENS/dark.gif"},
{key:"tombs",name:"Tombs",qty:800,img:"IMAGENS/tombs.gif"},
{key:"scarab",name:"Scarab",qty:600,img:"IMAGENS/scarab.gif"},
{key:"cyclops",name:"Cyclops",qty:500,img:"IMAGENS/cyclops.gif"},
{key:"mutated",name:"Mutated Humans",qty:600,img:"IMAGENS/mutated.gif"},
{key:"corym",name:"Coryms",qty:400,img:"IMAGENS/corym.gif"},
{key:"banuta",name:"Banuta",qty:500,img:"IMAGENS/banuta.gif"},
{key:"pirates",name:"Pirates",qty:700,img:"IMAGENS/pirate.gif"},
{key:"barbarian",name:"Barbarians",qty:700,img:"IMAGENS/barbarian.gif"},
{key:"djinn",name:"Djinn",qty:700,img:"IMAGENS/djinn.gif"},
{key:"stonerefiner",name:"Stonerefiner",qty:500,img:"IMAGENS/stone.gif"},
{key:"dragon",name:"Dragon",qty:800,img:"IMAGENS/dragon.gif"},
{key:"oramond",name:"Oramond",qty:1000,img:"IMAGENS/oramond.gif"}
];

function renderTasks(){

let div=document.getElementById("tasksList");
div.innerHTML="";

tasks.forEach(t=>{

let val = progress[currentHero]?.[t.key] || 0;
let pct = Math.floor(val/t.qty*100);

div.innerHTML+=`
<div class="card">

<img src="${t.img}" onerror="this.style.display='none'">
<b>${t.name}</b>

<div>${val}/${t.qty} (${pct}%)</div>

<div class="progress">
<div class="bar" style="width:${pct}%"></div>
</div>

<button onclick="edit('${t.key}',${t.qty})">✏️</button>

</div>
`;
});

}

function edit(key,max){

if(!currentHero){
alert("Selecione um hero");
return;
}

let v = prompt("Progresso:");

v = Number(v);

if(!progress[currentHero]) progress[currentHero]={};

progress[currentHero][key]=Math.min(v,max);

save();
renderTasks();
}

renderHeroes();
renderTasks();

</script>

</body>
</html>
